<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Indah's Beauté Atelier</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DUMMY123"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DUMMY123');
</script>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      background: var(--pink-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 3rem;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .auth-logo a {
      text-decoration: none;
    }

    .auth-logo .logo-icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 0.4rem;
    }

    .auth-logo .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--text-dark);
    }

    .auth-logo .logo-text em {
      color: var(--pink-deep);
    }

    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .auth-field {
      margin-bottom: 1.1rem;
    }

    .auth-field label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 0.4rem;
    }

    .auth-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      background: var(--off-white);
      transition: var(--transition);
      outline: none;
    }

    .auth-field input:focus {
      border-color: var(--pink-deep);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(232,117,143,0.12);
    }

    .auth-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--pink-deep);
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-btn:hover {
      background: #d4617a;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .auth-msg {
      margin-top: 0.75rem;
      font-size: 0.88rem;
      text-align: center;
      min-height: 1.2rem;
      color: #d4617a;
    }

    .auth-msg.success {
      color: var(--green-deep);
    }

    .auth-footer-text {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-light);
      margin-top: 1.5rem;
    }

    .auth-footer-text a {
      color: var(--pink-deep);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer-text a:hover {
      text-decoration: underline;
    }

    .auth-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="ad-brand-icon" aria-hidden="true" title="Atelier">IBA</span>
        <span class="logo-text">Indah's Beauté Atelier</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Produk</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
      </ul>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== AUTH FORM ===================== -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html">
          <span class="ad-brand-icon" aria-hidden="true" title="Atelier">IBA</span>
          <span class="logo-text">Indah's Beauté Atelier</span>
        </a>
      </div>

      <h1 class="auth-title">Selamat Datang</h1>
      <p class="auth-subtitle">Masuk ke akunmu untuk melanjutkan belanja</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="nama@email.com" required />
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-btn">Masuk</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <hr class="auth-divider" />

      <p class="auth-footer-text">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </p>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

  <!-- Firebase Configuration & Services -->
  <script src="firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>

  <!-- Default Products & Main Script -->
  <script src="js/default_products.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Init halaman login
    lucide.createIcons();

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const msgEl = document.getElementById('loginMsg');
      const btn = e.target.querySelector('button');

      msgEl.textContent = '';
      msgEl.className = 'auth-msg';

      if (!email || !password) {
        msgEl.textContent = '❌ Email dan password harus diisi.';
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = 'Sedang masuk...';

        // Check if Firebase is initialized
        if (typeof auth === 'undefined') {
          msgEl.textContent = '❌ Sistem sedang dimuat. Coba lagi sebentar.';
          btn.disabled = false;
          btn.textContent = 'Masuk';
          return;
        }

        // Sign in with Firebase Auth
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        msgEl.textContent = '✅ Berhasil masuk! Mengalihkan...';
        msgEl.className = 'auth-msg success';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);

      } catch (error) {
        console.error('Login error:', error);
        let errorMsg = '❌ Gagal masuk.';

        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMsg = '❌ Email atau password salah.';
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = '❌ Terlalu banyak percobaan. Coba lagi nanti.';
        } else if (error.code === 'auth/invalid-email') {
          errorMsg = '❌ Format email tidak valid.';
        } else if (error.message) {
          errorMsg = '❌ ' + error.message;
        }

        msgEl.textContent = errorMsg;
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    }

    // Check if user is already logged in → redirect to home
    if (typeof auth !== 'undefined') {
      auth.onAuthStateChanged((user) => {
        if (user) {
          window.location.href = 'index.html';
        }
      });
    }

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
  <script>initCSWidget();</script>
</body>
</html>
